# Prefix key: Cmd+B on macOS (via Meta), Ctrl+B elsewhere
# Note: Configure your terminal to send Meta for Cmd, or map Cmd+B to send \x1bb
if-shell "uname | grep -q Darwin" \
  "set -g prefix M-b; unbind C-b; bind M-b send-prefix" \
  "set -g prefix C-b; bind C-b send-prefix"

# Plugins (declared for TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Catppuccin config (must be set BEFORE loading the plugin)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_module_bg_color "#{@thm_surface_0}"
set -g @catppuccin_status_background "none"

# Load catppuccin (must happen BEFORE setting status line)
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Override: transparent gutter; left = continuous band with arrow separators; right = colored chain
set -g status-style "default"
set -g window-status-format "#{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | head -n 1)},#[fg=#{@thm_overlay_2}#,bg=default],#[fg=#{@thm_surface_0}#,bg=#{@thm_overlay_2}]}#[fg=#11111b#,bg=#{@thm_overlay_2}] #I #[fg=#{@thm_overlay_2}#,bg=#{@thm_surface_0}]#[fg=#{@thm_text}#,bg=#{@thm_surface_0}] #W #{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | tail -n 1)},#[fg=#{@thm_surface_0}#,bg=default],}"
set -g window-status-current-format "#{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | head -n 1)},#[fg=#{@thm_peach}#,bg=default],#[fg=#{@thm_surface_0}#,bg=#{@thm_peach}]}#[fg=#11111b#,bg=#{@thm_peach}#,bold] #I #[fg=#{@thm_peach}#,bg=#{@thm_surface_0}]#[fg=#{@thm_text}#,bg=#{@thm_surface_0}] #W #{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | tail -n 1)},#[fg=#{@thm_surface_0}#,bg=default],}"
set -g window-status-separator ""
# Status bar (must be set AFTER catppuccin loads)
set -g status-left ""
set -g status-right-length 100
set -g @catppuccin_session_icon "  "
set -g @catppuccin_status_connect_separator "yes"
set -g status-right "#[fg=#{@thm_red},bg=default]#[fg=#{@thm_crust},bg=#{@thm_red}]   #(whoami) #[fg=#{@thm_red},bg=#{@thm_peach}]#[fg=#{@thm_crust},bg=#{@thm_peach}]  #{b:pane_current_path} #(~/.local/bin/tmux-git-segment #{pane_current_path})#[fg=#{@thm_crust},bg=#{@thm_green}]  #S #[fg=#{@thm_green},bg=default]"
set-option -g status-position bottom

# Window text
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; run-shell "~/.tmux/plugins/tmux/catppuccin.tmux" \; set -g status-style "default" \; set -g window-status-format "#{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | head -n 1)},#[fg=#{@thm_overlay_2}#,bg=default],#[fg=#{@thm_surface_0}#,bg=#{@thm_overlay_2}]}#[fg=#11111b#,bg=#{@thm_overlay_2}] #I #[fg=#{@thm_overlay_2}#,bg=#{@thm_surface_0}]#[fg=#{@thm_text}#,bg=#{@thm_surface_0}] #W #{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | tail -n 1)},#[fg=#{@thm_surface_0}#,bg=default],}" \; set -g window-status-current-format "#{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | head -n 1)},#[fg=#{@thm_peach}#,bg=default],#[fg=#{@thm_surface_0}#,bg=#{@thm_peach}]}#[fg=#11111b#,bg=#{@thm_peach}#,bold] #I #[fg=#{@thm_peach}#,bg=#{@thm_surface_0}]#[fg=#{@thm_text}#,bg=#{@thm_surface_0}] #W #{?#{==:#{window_index},#(tmux list-windows -F '#{window_index}' | tail -n 1)},#[fg=#{@thm_surface_0}#,bg=default],}" \; set -g window-status-separator "" \; set -g status-right "#[fg=#{@thm_red},bg=default]#[fg=#{@thm_crust},bg=#{@thm_red}]   #(whoami) #[fg=#{@thm_red},bg=#{@thm_peach}]#[fg=#{@thm_crust},bg=#{@thm_peach}]  #{b:pane_current_path} #(~/.local/bin/tmux-git-segment #{pane_current_path})#[fg=#{@thm_crust},bg=#{@thm_green}]  #S #[fg=#{@thm_green},bg=default]" \; display-message "Config reloaded"

set -g base-index 1
setw -g pane-base-index 1

# Mouse support
set -g mouse on

# Pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# New windows/panes in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Performance
set -sg escape-time 0

# History
set -g history-limit 50000

# Terminal colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
