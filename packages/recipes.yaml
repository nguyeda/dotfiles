# Recipe = role → distro groups + common (cross-distro) tools.
#
# Edit a role's group list to change what gets installed.
# Group names refer to keys in `packages/<distro>.yaml` and `packages/common.yaml`.
#
# `macos: [brewfile]` is a magic group — it runs `brew bundle --file=Brewfile`
# instead of looking up a group definition.

roles:
  desktop-mac:
    macos:  [cli, vcs, containers, python, langs, iac, crypto-db, niche, gui]
    common: [chezmoi, fnm, claude, opencode]

  desktop-fedora:
    fedora: [core, cli, git-ui, terminals, iac, editors, gui-extras, cloud, docker, nvidia]
    common: [chezmoi, fnm, claude, opencode]

  pi:
    debian: [core, git, nvim-tarball, cli, git-ui, docker]
    common: [chezmoi, fnm, starship, claude, just]

  ec2:
    debian: [core, git, nvim-tarball, cli, just-apt, cloud]
    common: [chezmoi, fnm, starship, uv, jj-musl]

  devcontainer:
    debian: [core, nvim-tarball]
    common: [chezmoi, fnm, starship]

  ec2-devbox:
    amazon: [core, nvim-tarball]
    common: [chezmoi, fnm, starship, claude]
